<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Gloom Runner</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        canvas {
            background: #000;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        #ui {
            font-size: 18px;
            margin-bottom: 15px;
            width: 420px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .danger {
            color: #e84118;
            font-weight: bold;
        }

        .buff {
            color: #fbc531;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="ui">
        <span>關卡:<span id="lvl">1</span></span>
        <span>敵人:<span id="enm">0</span></span>
        <span>時間:<span id="time">15</span>s <span id="buff" class="buff"></span></span>
    </div>
    <canvas id="game" width="420" height="420"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const $ = id => document.getElementById(id);

        const size = 21, w = 20;
        let grid = [], player = { x: 1, y: 1 }, enemies = [];
        let treasure = { x: 0, y: 0, active: false }, revealExpire = 0;
        let level = 1, numEnemies = 0, timeLeft = 15, lastTime = Date.now(), frames = 0;

        // 隨機生成完美迷宮 (DFS 演算法)
        function genMaze() {
            for (let y = 0; y < size; y++) {
                grid[y] = [];
                for (let x = 0; x < size; x++) grid[y][x] = 1;
            }
            let stack = [[1, 1]];
            grid[1][1] = 0;

            while (stack.length > 0) {
                let [cx, cy] = stack.pop();
                let dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);
                for (let [dx, dy] of dirs) {
                    let nx = cx + dx, ny = cy + dy;
                    if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && grid[ny][nx] === 1) {
                        grid[cy + dy / 2][cx + dx / 2] = 0;
                        grid[ny][nx] = 0;
                        stack.push([cx, cy], [nx, ny]);
                        break;
                    }
                }
            }
        }

        // 生成實體 (敵人與寶物)
        function spawnEntities() {
            enemies = [];
            let empty = [];
            for (let y = 1; y < size - 1; y++) {
                for (let x = 1; x < size - 1; x++) {
                    // 動態計算距離，避免敵人或寶物直接生成在玩家附近 (4格內) 或終點
                    let distToPlayer = Math.hypot(x - player.x, y - player.y);
                    if (grid[y][x] === 0 && distToPlayer > 4 && !(x === size - 2 && y === size - 2)) {
                        empty.push({ x, y });
                    }
                }
            }
            empty.sort(() => Math.random() - 0.5);

            for (let i = 0; i < numEnemies; i++) {
                if (empty.length > 0) enemies.push(empty.pop());
            }
            if (empty.length > 0) {
                let t = empty.pop();
                treasure = { x: t.x, y: t.y, active: true };
            }
            revealExpire = 0;
        }

        // 關卡初始設定 (進入下一關、或死亡重生)
        function initLevel() {
            player = { x: 1, y: 1 };
            genMaze();
            spawnEntities();
            timeLeft = 15;
            lastTime = Date.now();
            updateUI();
        }

        function updateUI() {
            $('lvl').innerText = level;
            $('enm').innerText = numEnemies;
            $('time').innerText = timeLeft;
            $('time').className = timeLeft <= 5 ? 'danger' : '';
        }

        function loop() {
            requestAnimationFrame(loop);
            frames++;
            let now = Date.now();

            // 1. 倒數計時器邏輯
            if (now - lastTime >= 1000) {
                timeLeft--;
                lastTime = now;

                // 【超時懲罰修改】保留玩家位置，僅重置地圖與敵人
                if (timeLeft <= 0) {
                    numEnemies++;
                    genMaze();
                    // 強制把玩家腳下打通，避免迷宮重組時被牆壁夾死
                    grid[player.y][player.x] = 0;
                    spawnEntities();
                    timeLeft = 15;
                }
                updateUI();
            }

            // 2. 敵人 AI 移動
            if (frames % 25 === 0) {
                for (let e of enemies) {
                    let validDirs = [[0, -1], [0, 1], [-1, 0], [1, 0]].filter(d => grid[e.y + d[1]][e.x + d[0]] !== 1);
                    if (validDirs.length > 0) {
                        let move = validDirs[Math.floor(Math.random() * validDirs.length)];
                        e.x += move[0]; e.y += move[1];
                    }
                    if (e.x === player.x && e.y === player.y) return gameOver();
                }
            }

            // 3. 渲染畫面
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let isRevealed = now < revealExpire;
            $('buff').innerText = isRevealed ? `(全圖視野 ${Math.ceil((revealExpire - now) / 1000)}s)` : '';

            // 畫出迷宮 (修改手電筒半徑 4.5 -> 2.5)
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    let dist = Math.hypot(x - player.x, y - player.y);
                    if (isRevealed || dist <= 2.5) {
                        if (grid[y][x] === 1) ctx.fillStyle = '#7f8fa6';
                        else ctx.fillStyle = '#2f3640';
                        ctx.fillRect(x * w, y * w, w, w);
                    }
                }
            }

            // 畫出口 (綠)
            ctx.fillStyle = '#4cd137';
            ctx.fillRect((size - 2) * w, (size - 2) * w, w, w);

            // 畫寶物 (黃)
            if (treasure.active) {
                ctx.fillStyle = '#fbc531';
                ctx.beginPath();
                ctx.arc(treasure.x * w + w / 2, treasure.y * w + w / 2, w / 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // 畫敵人 (紅)
            ctx.fillStyle = '#e84118';
            for (let e of enemies) ctx.fillRect(e.x * w + 2, e.y * w + 2, w - 4, w - 4);

            // 畫玩家 (藍)
            ctx.fillStyle = '#00a8ff';
            ctx.fillRect(player.x * w + 2, player.y * w + 2, w - 4, w - 4);
        }

        document.addEventListener('keydown', e => {
            let dx = 0, dy = 0;
            if (e.key === 'ArrowUp') dy = -1;
            else if (e.key === 'ArrowDown') dy = 1;
            else if (e.key === 'ArrowLeft') dx = -1;
            else if (e.key === 'ArrowRight') dx = 1;
            else return;

            if (grid[player.y + dy][player.x + dx] !== 1) {
                player.x += dx; player.y += dy;

                if (enemies.some(e => e.x === player.x && e.y === player.y)) return gameOver();

                if (treasure.active && player.x === treasure.x && player.y === treasure.y) {
                    treasure.active = false;
                    revealExpire = Date.now() + 5000;
                }

                if (player.x === size - 2 && player.y === size - 2) {
                    level++;
                    initLevel();
                }
            }
        });

        function gameOver() {
            alert(`Game Over! 你在黑暗中活到了第 ${level} 關。`);
            level = 1; numEnemies = 0;
            initLevel();
        }

        initLevel();
        requestAnimationFrame(loop);
    </script>
</body>

</html>
