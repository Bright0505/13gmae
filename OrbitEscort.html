<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tethered Core - JS13K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: auto;
            transition: opacity 0.3s;
        }
        .hidden { display: none; opacity: 0; }
        h1 { margin: 0 0 20px 0; color: #00ffff; text-shadow: 0 0 10px #00ffff; }
        p { font-size: 1.1em; line-height: 1.6; color: #ddd; }
        .highlight { color: #ff00ff; font-weight: bold; }
        button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1.2em;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #00ffff;
            transition: 0.2s;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div id="startScreen" class="screen">
            <h1>Tethered Core 繫繩核心</h1>
            <p>
                移動：<span class="highlight">滑鼠拖曳</span> (太空船跟隨)<br>
                抓取/放置核心：<span class="highlight">點擊滑鼠左鍵</span><br>
                武器：<span class="highlight">自動射擊</span><br>
            </p>
            <p style="font-size: 0.95em; color: #aaa; text-align: left; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px;">
                ⚠️ <b>警告：</b> 你與核心都有 3 點血量。任一方血量歸零即 Game Over！<br><br>
                🟩 <b>綠包 (W)：</b> 升級武器 (最高8向射擊)<br>
                🟦 <b>藍包 (S)：</b> 在核心當前位置展開 10 秒安全區<br>
                🟥 <b>紅包 (H)：</b> 恢復玩家 1 HP。若吃下時「核心正吸附在身上」，則核心也會一併恢復 1 HP！
            </p>
            <button onclick="startGame()">開始任務</button>
        </div>

        <div id="gameOverScreen" class="screen hidden">
            <h1 id="gameOverTitle" style="color: #ff3333; text-shadow: 0 0 10px #ff3333;">訊號中斷</h1>
            <p>存活時間： <span id="survivalTime" class="highlight" style="font-size: 1.5em;">0</span> 秒</p>
            <button onclick="resetGame()">重新部署</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const survivalTimeEl = document.getElementById('survivalTime');
const gameOverTitleEl = document.getElementById('gameOverTitle');

// --- 全域變數與遊戲狀態 ---
let gameState = 'MENU';
let lastTime = 0;
let surviveTimer = 0;

let player = {};
let core = {};
let bullets = [];
let meteors = [];
let items = [];
let safeZones = [];
let particles = [];

let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

// 設定常數
const WEAPON_TYPES = { STRAIGHT: 1, SPREAD: 2, RING: 3 };
const ITEM_TYPES = { WEAPON: 0, SAFE: 1, REPAIR: 2 };
const MAX_HP = 3;

// --- 初始化與重置 ---
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function initEntities() {
    player = {
        x: canvas.width / 2,
        y: canvas.height * 0.7,
        r: 15,
        hp: MAX_HP,
        weaponLevel: WEAPON_TYPES.STRAIGHT,
        lastShootTime: 0,
        shootInterval: 200,
        invulnTimer: 0 // 無敵時間 (受傷後閃爍)
    };
    
    core = {
        x: canvas.width / 2,
        y: canvas.height * 0.7 + 30,
        r: 12,
        hp: MAX_HP,
        attached: true
    };

    bullets = []; meteors = []; items = []; safeZones = []; particles = [];
    surviveTimer = 0;
}

// --- 事件監聽 ---
canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

canvas.addEventListener('mousedown', (e) => {
    if (gameState === 'PLAYING') {
        core.attached = !core.attached;
        createParticles(core.x, core.y, 10, '#ffa500');
    }
});

// --- 遊戲控制邏輯 ---
function startGame() {
    startScreen.classList.add('hidden');
    initEntities();
    gameState = 'PLAYING';
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

function resetGame() {
    gameOverScreen.classList.add('hidden');
    initEntities();
    gameState = 'PLAYING';
    lastTime = performance.now();
}

function gameOver(reason) {
    gameState = 'GAMEOVER';
    survivalTimeEl.innerText = Math.floor(surviveTimer / 1000);
    gameOverTitleEl.innerText = reason === 'PLAYER' ? '機體摧毀' : '核心摧毀';
    gameOverScreen.classList.remove('hidden');
}

// --- 更新邏輯 ---
function update(dt, now) {
    surviveTimer += dt;

    // 玩家無敵時間倒數
    if (player.invulnTimer > 0) player.invulnTimer -= dt;

    // 更新玩家與核心位置
    player.x += (mouse.x - player.x) * 0.15;
    player.y += (mouse.y - player.y) * 0.15;

    if (core.attached) {
        core.x += (player.x - core.x) * 0.2;
        core.y += ((player.y + 35) - core.y) * 0.2;
    }

    // 自動射擊
    if (now - player.lastShootTime > player.shootInterval) shoot(now);

    // 更新子彈
    bullets.forEach(b => { b.x += b.vx; b.y += b.vy; });
    bullets = bullets.filter(b => b.y > -50 && b.y < canvas.height + 50 && b.x > -50 && b.x < canvas.width + 50);

    // 更新安全區
    safeZones.forEach(sz => sz.timeLeft -= dt);
    safeZones = safeZones.filter(sz => sz.timeLeft > 0);

    // 生成與更新隕石
    let spawnRate = Math.min(0.02 + (surviveTimer / 60000) * 0.05, 0.1); 
    if (Math.random() < spawnRate) {
        meteors.push({
            x: Math.random() * canvas.width,
            y: -30,
            vx: (Math.random() - 0.5) * 2,
            vy: Math.random() * 2 + 1 + (surviveTimer / 30000),
            r: Math.random() * 15 + 10,
            hp: 2
        });
    }
    meteors.forEach(m => { m.x += m.vx; m.y += m.vy; });
    meteors = meteors.filter(m => m.y < canvas.height + 50);

    // 生成與更新道具 (三種道具機率平分)
    if (Math.random() < 0.002) {
        let rand = Math.random();
        let itemType = ITEM_TYPES.WEAPON;
        if (rand > 0.33 && rand < 0.66) itemType = ITEM_TYPES.SAFE;
        else if (rand >= 0.66) itemType = ITEM_TYPES.REPAIR;

        items.push({ x: Math.random() * canvas.width, y: -20, vy: 1.5, r: 10, type: itemType });
    }
    items.forEach(i => i.y += i.vy);
    items = items.filter(i => i.y < canvas.height + 50);

    // 更新特效
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= dt; p.alpha = Math.max(0, p.life / p.maxLife); });
    particles = particles.filter(p => p.life > 0);

    checkCollisions();
}

function shoot(now) {
    player.lastShootTime = now;
    const speed = 10;
    
    if (player.weaponLevel === WEAPON_TYPES.STRAIGHT) {
        bullets.push({ x: player.x, y: player.y - 10, vx: 0, vy: -speed, r: 3 });
    } 
    else if (player.weaponLevel === WEAPON_TYPES.SPREAD) {
        bullets.push({ x: player.x, y: player.y - 10, vx: 0, vy: -speed, r: 3 });
        bullets.push({ x: player.x, y: player.y - 10, vx: -2, vy: -speed * 0.9, r: 3 });
        bullets.push({ x: player.x, y: player.y - 10, vx: 2, vy: -speed * 0.9, r: 3 });
    }
    else if (player.weaponLevel >= WEAPON_TYPES.RING) {
        for(let i=0; i<8; i++) {
            let angle = (i * 45) * Math.PI / 180;
            bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle) * speed * 0.6, vy: Math.sin(angle) * speed * 0.6, r: 4 });
        }
    }
}

function checkCollisions() {
    const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

    // 子彈 vs 隕石
    for (let i = bullets.length - 1; i >= 0; i--) {
        for (let j = meteors.length - 1; j >= 0; j--) {
            let b = bullets[i], m = meteors[j];
            if (!b || !m) continue;

            if (dist(b, m) < b.r + m.r) {
                m.hp--;
                bullets.splice(i, 1);
                createParticles(b.x, b.y, 5, '#ffff00');
                if (m.hp <= 0) {
                    createParticles(m.x, m.y, 15, '#ff5555');
                    meteors.splice(j, 1);
                }
                break;
            }
        }
    }

    // 玩家 vs 道具
    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        if (dist(player, item) < player.r + item.r) {
            if (item.type === ITEM_TYPES.WEAPON) {
                player.weaponLevel = Math.min(player.weaponLevel + 1, WEAPON_TYPES.RING);
                createParticles(item.x, item.y, 20, '#00ff00');
            } else if (item.type === ITEM_TYPES.SAFE) {
                safeZones.push({ x: core.x, y: core.y, r: 100, timeLeft: 10000 });
                createParticles(item.x, item.y, 20, '#00ffff');
            } else if (item.type === ITEM_TYPES.REPAIR) {
                // 修復機制：玩家補血，若核心吸附著也一起補血
                player.hp = Math.min(MAX_HP, player.hp + 1);
                createParticles(player.x, player.y, 20, '#ff3333');
                if (core.attached) {
                    core.hp = Math.min(MAX_HP, core.hp + 1);
                    createParticles(core.x, core.y, 20, '#ffa500');
                }
            }
            items.splice(i, 1);
        }
    }

    // 隕石 vs 玩家
    for (let i = meteors.length - 1; i >= 0; i--) {
        let m = meteors[i];
        if (player.invulnTimer <= 0 && dist(player, m) < player.r + m.r) {
            player.hp--;
            player.invulnTimer = 1500; // 1.5秒無敵時間
            createParticles(player.x, player.y, 30, '#00ffff');
            meteors.splice(i, 1); // 隕石撞毀
            ctx.translate((Math.random()-0.5)*20, (Math.random()-0.5)*20); // 畫面震動
            
            if (player.hp <= 0) { gameOver('PLAYER'); return; }
        }
    }

    // 隕石 vs 核心
    for (let i = meteors.length - 1; i >= 0; i--) {
        let m = meteors[i];
        if (!m) continue;
        if (dist(core, m) < core.r + m.r) {
            let isSafe = safeZones.some(sz => dist(core, sz) < sz.r);
            meteors.splice(i, 1);
            createParticles(m.x, m.y, 20, '#ff5555');

            if (!isSafe) {
                core.hp--;
                createParticles(core.x, core.y, 30, '#ffa500');
                ctx.translate((Math.random()-0.5)*20, (Math.random()-0.5)*20);
                
                if (core.hp <= 0) { gameOver('CORE'); return; }
            } else {
                createParticles(core.x, core.y, 10, '#00ffff'); 
            }
        }
    }
}

// --- 繪圖函式 ---
function createParticles(x, y, count, color) {
    for(let i=0; i<count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 3;
        particles.push({
            x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 500 + Math.random() * 500, maxLife: 1000, color: color, alpha: 1
        });
    }
}

function drawCircle(x, y, r, fill, glowColor) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    if (glowColor) { ctx.shadowBlur = 15; ctx.shadowColor = glowColor; } 
    else { ctx.shadowBlur = 0; }
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.shadowBlur = 0; 
}

function draw() {
    ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    const bgOffset = (surviveTimer / 20) % 50;
    for(let i = 0; i < canvas.width; i+=50) { ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); }
    for(let i = 0; i < canvas.height; i+=50) { ctx.moveTo(0, i + bgOffset); ctx.lineTo(canvas.width, i + bgOffset); }
    ctx.stroke();

    safeZones.forEach(sz => {
        ctx.beginPath();
        ctx.arc(sz.x, sz.y, sz.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 255, 255, ${0.1 + Math.sin(surviveTimer/200)*0.05})`;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(sz.x, sz.y, sz.r + 5, -Math.PI/2, -Math.PI/2 + (sz.timeLeft/10000) * Math.PI * 2);
        ctx.strokeStyle = '#00ffff';
        ctx.stroke();
    });

    items.forEach(item => {
        let color = '#00ff00'; let text = 'W';
        if (item.type === ITEM_TYPES.SAFE) { color = '#00ffff'; text = 'S'; }
        else if (item.type === ITEM_TYPES.REPAIR) { color = '#ff3333'; text = 'H'; }
        
        drawCircle(item.x, item.y, item.r, color, color);
        ctx.fillStyle = '#000'; ctx.font = 'bold 12px Arial'; 
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, item.x, item.y);
    });

    bullets.forEach(b => drawCircle(b.x, b.y, b.r, '#ffff00', '#ffff00'));

    meteors.forEach(m => {
        ctx.beginPath();
        let edges = 6;
        for(let i=0; i<edges; i++) {
            let angle = (i/edges) * Math.PI * 2;
            let rNoise = m.r * (0.8 + (i%2)*0.4); 
            let px = m.x + Math.cos(angle) * rNoise;
            let py = m.y + Math.sin(angle) * rNoise;
            if(i===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = '#553333'; ctx.fill();
        ctx.strokeStyle = '#ff7777'; ctx.stroke();
    });

    // 繪製玩家 (受傷時閃爍)
    if (player.invulnTimer <= 0 || Math.floor(surviveTimer / 100) % 2 === 0) {
        drawCircle(player.x, player.y, player.r, '#00ffff', '#00ffff');
        drawCircle(player.x, player.y, player.r/2, '#ffffff');
    }

    // 繪製核心
    let coreColor = core.attached ? '#ffcc00' : '#ffa500';
    let coreGlow = `rgba(255, 165, 0, ${0.5 + Math.sin(surviveTimer/150)*0.5})`;
    drawCircle(core.x, core.y, core.r, coreColor, coreGlow);
    
    if (core.attached) {
        ctx.beginPath();
        ctx.moveTo(player.x, player.y); ctx.lineTo(core.x, core.y);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
    }

    particles.forEach(p => {
        ctx.globalAlpha = p.alpha;
        drawCircle(p.x, p.y, 2, p.color);
    });
    ctx.globalAlpha = 1.0;

    // 繪製 UI
    ctx.fillStyle = '#fff';
    ctx.font = '20px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`存活時間: ${Math.floor(surviveTimer / 1000)}s`, 20, 30);
    
    ctx.fillText(`機體 HP:`, 20, 65);
    for(let i=0; i<MAX_HP; i++) {
        ctx.fillStyle = i < player.hp ? '#00ffff' : '#555';
        ctx.fillRect(100 + i*30, 48, 20, 20);
    }

    ctx.fillText(`核心 HP:`, 20, 95);
    for(let i=0; i<MAX_HP; i++) {
        ctx.fillStyle = i < core.hp ? '#ffa500' : '#555';
        ctx.fillRect(100 + i*30, 78, 20, 20);
    }
}

function gameLoop(now) {
    if (gameState !== 'PLAYING') return;
    let dt = now - lastTime;
    lastTime = now;
    if (dt > 100) dt = 16; 

    ctx.save(); 
    update(dt, now);
    draw();
    ctx.restore();

    requestAnimationFrame(gameLoop);
}

draw();
</script>
</body>
</html>
