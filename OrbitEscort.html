<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Defender - JS13K</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            overflow: hidden;
            /* 隱藏卷軸 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            cursor: crosshair;
            /* 滑鼠游標改為十字 */
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* 讓點擊事件穿透到 canvas */
        }

        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            pointer-events: auto;
            /* 允許點擊 */
            transition: opacity 0.3s;
        }

        .hidden {
            display: none;
            opacity: 0;
        }

        h1 {
            margin: 0 0 20px 0;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        p {
            font-size: 1.2em;
            line-height: 1.5;
            color: #ddd;
        }

        .highlight {
            color: #ff00ff;
            font-weight: bold;
        }

        button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1.2em;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px #00ffff;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <!-- 開始畫面 -->
        <div id="startScreen" class="screen">
            <h1>核心守護者 Core Defender</h1>
            <p>
                移動：<span class="highlight">滑鼠拖曳</span> (太空船跟隨)<br>
                抓取/放置核心：<span class="highlight">點擊滑鼠左鍵</span><br>
                武器：<span class="highlight">自動射擊</span><br>
            </p>
            <p style="font-size: 0.9em; color: #aaa;">
                保護發光的「橘色核心」，若被隕石擊中 3 次即 Game Over。<br>
                收集「綠色包」升級武器，「藍色包」可產生 10 秒安全區。
            </p>
            <button onclick="startGame()">開始遊戲</button>
        </div>

        <!-- 遊戲結束畫面 -->
        <div id="gameOverScreen" class="screen hidden">
            <h1 style="color: #ff3333; text-shadow: 0 0 10px #ff3333;">核心摧毀</h1>
            <p>你成功守護了核心 <span id="survivalTime" class="highlight">0</span> 秒！</p>
            <button onclick="resetGame()">再次挑戰</button>
        </div>
    </div>

    <script>
        /**
         * JS13K 微型射擊遊戲架構
         * 包含：Game Loop, 實體管理, 碰撞偵測, 繪製
         */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const survivalTimeEl = document.getElementById('survivalTime');

        // --- 全域變數與遊戲狀態 ---
        let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
        let lastTime = 0;
        let surviveTimer = 0;

        // 實體儲存區 (Entities Store)
        let player = {};
        let core = {};
        let bullets = [];
        let meteors = [];
        let items = [];
        let safeZones = [];
        let particles = []; // 爆炸特效

        // 控制狀態
        let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

        // 遊戲設定常數
        const WEAPON_TYPES = { STRAIGHT: 1, SPREAD: 2, RING: 3 };
        const ITEM_TYPES = { WEAPON: 0, SAFE: 1 };
        const CORE_MAX_HP = 3;

        // --- 初始化與重置 ---
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function initEntities() {
            player = {
                x: canvas.width / 2,
                y: canvas.height * 0.7,
                r: 15,
                weaponLevel: WEAPON_TYPES.STRAIGHT,
                lastShootTime: 0,
                shootInterval: 200 // 射擊間隔(ms)
            };

            core = {
                x: canvas.width / 2,
                y: canvas.height * 0.7 + 30,
                r: 12,
                hp: CORE_MAX_HP,
                attached: true // 初始吸附於玩家
            };

            bullets = [];
            meteors = [];
            items = [];
            safeZones = [];
            particles = [];
            surviveTimer = 0;
        }

        // --- 事件監聽 (Input) ---
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mousedown', (e) => {
            if (gameState === 'PLAYING') {
                // 點擊切換核心吸附狀態
                core.attached = !core.attached;

                // 產生一點特效
                createParticles(core.x, core.y, 10, '#ffa500');
            }
        });

        // --- 遊戲控制邏輯 ---
        function startGame() {
            startScreen.classList.add('hidden');
            initEntities();
            gameState = 'PLAYING';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            gameOverScreen.classList.add('hidden');
            initEntities();
            gameState = 'PLAYING';
            lastTime = performance.now();
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            survivalTimeEl.innerText = Math.floor(surviveTimer / 1000);
            gameOverScreen.classList.remove('hidden');
        }

        // --- 更新邏輯 (Update) ---
        function update(dt, now) {
            surviveTimer += dt;

            // 1. 更新玩家位置 (平滑跟隨滑鼠)
            player.x += (mouse.x - player.x) * 0.1;
            player.y += (mouse.y - player.y) * 0.1;

            // 2. 更新核心位置
            if (core.attached) {
                // 吸附時跟隨在太空船下方
                core.x += (player.x - core.x) * 0.2;
                core.y += ((player.y + 35) - core.y) * 0.2;
            }

            // 3. 自動射擊
            if (now - player.lastShootTime > player.shootInterval) {
                shoot(now);
            }

            // 4. 更新子彈
            bullets.forEach(b => {
                b.x += b.vx;
                b.y += b.vy;
            });
            // 移除出界的子彈
            bullets = bullets.filter(b => b.y > -50 && b.y < canvas.height + 50 && b.x > -50 && b.x < canvas.width + 50);

            // 5. 更新安全區 (倒數計時)
            safeZones.forEach(sz => sz.timeLeft -= dt);
            safeZones = safeZones.filter(sz => sz.timeLeft > 0);

            // 6. 生成與更新隕石
            // 隨時間增加生成機率，上限 0.1
            let spawnRate = Math.min(0.02 + (surviveTimer / 60000) * 0.05, 0.1);
            if (Math.random() < spawnRate) {
                meteors.push({
                    x: Math.random() * canvas.width,
                    y: -30,
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 2 + 1 + (surviveTimer / 30000), // 隨時間變快
                    r: Math.random() * 15 + 10,
                    hp: 2
                });
            }
            meteors.forEach(m => {
                m.x += m.vx;
                m.y += m.vy;
            });
            meteors = meteors.filter(m => m.y < canvas.height + 50);

            // 7. 生成與更新道具
            if (Math.random() < 0.002) { // 道具出現率
                items.push({
                    x: Math.random() * canvas.width,
                    y: -20,
                    vy: 1.5,
                    r: 10,
                    type: Math.random() < 0.5 ? ITEM_TYPES.WEAPON : ITEM_TYPES.SAFE
                });
            }
            items.forEach(i => i.y += i.vy);
            items = items.filter(i => i.y < canvas.height + 50);

            // 8. 更新特效
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt;
                p.alpha = Math.max(0, p.life / p.maxLife);
            });
            particles = particles.filter(p => p.life > 0);

            // 9. 碰撞偵測 (Collision)
            checkCollisions();
        }

        function shoot(now) {
            player.lastShootTime = now;
            const speed = 10;

            if (player.weaponLevel === WEAPON_TYPES.STRAIGHT) {
                bullets.push({ x: player.x, y: player.y - 10, vx: 0, vy: -speed, r: 3 });
            }
            else if (player.weaponLevel === WEAPON_TYPES.SPREAD) {
                bullets.push({ x: player.x, y: player.y - 10, vx: 0, vy: -speed, r: 3 });
                bullets.push({ x: player.x, y: player.y - 10, vx: -2, vy: -speed * 0.9, r: 3 });
                bullets.push({ x: player.x, y: player.y - 10, vx: 2, vy: -speed * 0.9, r: 3 });
            }
            else if (player.weaponLevel >= WEAPON_TYPES.RING) {
                // 環狀射擊 8 方向
                for (let i = 0; i < 8; i++) {
                    let angle = (i * 45) * Math.PI / 180;
                    bullets.push({
                        x: player.x, y: player.y,
                        vx: Math.cos(angle) * speed * 0.6,
                        vy: Math.sin(angle) * speed * 0.6,
                        r: 4
                    });
                }
            }
        }

        function checkCollisions() {
            // 輔助函式：計算兩圓距離
            const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

            // 子彈 vs 隕石
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = meteors.length - 1; j >= 0; j--) {
                    let b = bullets[i];
                    let m = meteors[j];
                    if (!b || !m) continue;

                    if (dist(b, m) < b.r + m.r) {
                        m.hp--;
                        bullets.splice(i, 1);
                        createParticles(b.x, b.y, 5, '#ffff00'); // 火花

                        if (m.hp <= 0) {
                            createParticles(m.x, m.y, 15, '#ff5555'); // 爆炸
                            meteors.splice(j, 1);
                        }
                        break; // 子彈已銷毀，跳出內層迴圈
                    }
                }
            }

            // 玩家 vs 道具
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                if (dist(player, item) < player.r + item.r) {
                    if (item.type === ITEM_TYPES.WEAPON) {
                        player.weaponLevel = Math.min(player.weaponLevel + 1, WEAPON_TYPES.RING);
                        createParticles(item.x, item.y, 20, '#00ff00');
                    } else if (item.type === ITEM_TYPES.SAFE) {
                        safeZones.push({ x: core.x, y: core.y, r: 100, timeLeft: 10000 }); // 10秒安全區，開在核心當前位置
                        createParticles(item.x, item.y, 20, '#00ffff');
                    }
                    items.splice(i, 1);
                }
            }

            // 隕石 vs 核心
            for (let i = meteors.length - 1; i >= 0; i--) {
                let m = meteors[i];
                if (dist(core, m) < core.r + m.r) {
                    // 檢查核心是否在任何安全區內
                    let isSafe = safeZones.some(sz => dist(core, sz) < sz.r);

                    meteors.splice(i, 1);
                    createParticles(m.x, m.y, 20, '#ff5555');

                    if (!isSafe) {
                        core.hp--;
                        createParticles(core.x, core.y, 30, '#ffa500'); // 核心受損特效
                        // 畫面震動(視覺效果)
                        ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10);

                        if (core.hp <= 0) {
                            gameOver();
                        }
                    } else {
                        // 在安全區內被擋下的特效
                        createParticles(core.x, core.y, 10, '#00ffff');
                    }
                }
            }
        }

        // --- 特效與繪圖函式 (Render) ---
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 3;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 500 + Math.random() * 500, // 存活時間 ms
                    maxLife: 1000,
                    color: color,
                    alpha: 1
                });
            }
        }

        function drawCircle(x, y, r, fill, glowColor) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            if (glowColor) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = glowColor;
            } else {
                ctx.shadowBlur = 0;
            }
            ctx.fillStyle = fill;
            ctx.fill();
            ctx.shadowBlur = 0; // 重置
        }

        function draw() {
            // 清除畫布，帶有一點殘影效果
            ctx.fillStyle = 'rgba(5, 5, 16, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製格線背景 (科技感)
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            const bgOffset = (surviveTimer / 20) % 50;
            for (let i = 0; i < canvas.width; i += 50) { ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); }
            for (let i = 0; i < canvas.height; i += 50) { ctx.moveTo(0, i + bgOffset); ctx.lineTo(canvas.width, i + bgOffset); }
            ctx.stroke();

            // 繪製安全區
            safeZones.forEach(sz => {
                ctx.beginPath();
                ctx.arc(sz.x, sz.y, sz.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 255, ${0.1 + Math.sin(surviveTimer / 200) * 0.05})`; // 呼吸燈效果
                ctx.fill();
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 畫倒數計時弧線
                ctx.beginPath();
                ctx.arc(sz.x, sz.y, sz.r + 5, -Math.PI / 2, -Math.PI / 2 + (sz.timeLeft / 10000) * Math.PI * 2);
                ctx.strokeStyle = '#00ffff';
                ctx.stroke();
            });

            // 繪製道具
            items.forEach(item => {
                let color = item.type === ITEM_TYPES.WEAPON ? '#00ff00' : '#00ffff';
                drawCircle(item.x, item.y, item.r, color, color);
                // 道具內部文字
                ctx.fillStyle = '#000';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(item.type === ITEM_TYPES.WEAPON ? 'W' : 'S', item.x, item.y);
            });

            // 繪製子彈
            bullets.forEach(b => {
                drawCircle(b.x, b.y, b.r, '#ffff00', '#ffff00');
            });

            // 繪製隕石
            meteors.forEach(m => {
                ctx.beginPath();
                // 隨機多邊形模擬石頭
                let edges = 6;
                for (let i = 0; i < edges; i++) {
                    let angle = (i / edges) * Math.PI * 2;
                    let rNoise = m.r * (0.8 + (i % 2) * 0.4);
                    let px = m.x + Math.cos(angle) * rNoise;
                    let py = m.y + Math.sin(angle) * rNoise;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fillStyle = '#553333';
                ctx.fill();
                ctx.strokeStyle = '#ff7777';
                ctx.stroke();
            });

            // 繪製玩家
            drawCircle(player.x, player.y, player.r, '#00ffff', '#00ffff');
            // 玩家核心
            drawCircle(player.x, player.y, player.r / 2, '#ffffff');

            // 繪製核心 (被保護的目標)
            let coreColor = core.attached ? '#ffcc00' : '#ffa500';
            let coreGlow = `rgba(255, 165, 0, ${0.5 + Math.sin(surviveTimer / 150) * 0.5})`;
            drawCircle(core.x, core.y, core.r, coreColor, coreGlow);
            // 畫一條連接線 (若吸附)
            if (core.attached) {
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(core.x, core.y);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 繪製特效
            particles.forEach(p => {
                ctx.globalAlpha = p.alpha;
                drawCircle(p.x, p.y, 2, p.color);
            });
            ctx.globalAlpha = 1.0;

            // 繪製 UI (血量與時間)
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`存活時間: ${Math.floor(surviveTimer / 1000)}s`, 20, 30);

            // 核心血量條
            ctx.fillText(`核心 HP:`, 20, 60);
            for (let i = 0; i < CORE_MAX_HP; i++) {
                ctx.fillStyle = i < core.hp ? '#ffa500' : '#555';
                ctx.fillRect(100 + i * 30, 45, 20, 20);
            }
        }

        // --- 遊戲主迴圈 (Game Loop) ---
        function gameLoop(now) {
            if (gameState !== 'PLAYING') return;

            let dt = now - lastTime;
            lastTime = now;

            // 防止切換標籤頁產生過大的時間跳躍
            if (dt > 100) dt = 16;

            ctx.save(); // 為了畫面震動特效準備
            update(dt, now);
            draw();
            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        // 初始化繪製一次背景，讓開始畫面不那麼無聊
        draw();

    </script>
</body>

</html>
